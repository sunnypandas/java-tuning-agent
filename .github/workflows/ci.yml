name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build and test
        run: mvn -B verify

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: java-tuning-agent-${{ github.sha }}
          retention-days: 14
          path: |
            target/java-tuning-agent-*.jar
            target/java-tuning-agent-*-mcp-schemas.json
