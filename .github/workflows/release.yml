name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      # Tag must be vX.Y.Z… — Maven version is the tag without the leading "v".
      - name: Resolve Maven revision from tag
        run: |
          TAG="${{ github.ref_name }}"
          case "$TAG" in v*) ;;
            *) echo "::error::Release tags must start with 'v' (got '$TAG')"; exit 1 ;;
          esac
          echo "MVN_REVISION=${TAG#v}" >> "$GITHUB_ENV"

      - name: Build and test
        run: mvn -B verify -Drevision="$MVN_REVISION"

      - name: Create GitHub Release with assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/java-tuning-agent-*.jar
            target/java-tuning-agent-*-mcp-schemas.json
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
