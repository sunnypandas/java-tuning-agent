spring:
  application:
    name: java-tuning-agent
  main:
    banner-mode: off
    keep-alive: true
    web-application-type: none
  ai:
    mcp:
      server:
        name: java-tuning-agent
        version: 0.0.1
        stdio: true

java-tuning-agent:
  command-whitelist:
    - jps
    - jcmd
    - jstat
  command:
    default-timeout-ms: 15000
    default-max-output-bytes: 8388608
    privileged-max-output-bytes: 67108864
  sampling:
    default-sample-count: 3
    default-interval-ms: 10000
    max-sample-count: 20
    max-total-duration-ms: 300000
  # When true (default via code), index .hprof with Shark after GC.heap_dump or when offline draft path exists.
  heap-summary:
    auto-enabled: true
  offline:
    heap-summary:
      default-top-classes: 40
      default-max-output-chars: 32000
    # chunk-base-dir: # optional; empty uses java.io.tmpdir/java-tuning-agent-offline-chunks
